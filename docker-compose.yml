version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: electropi_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: electropi_pm

  api:
    build: .
    container_name: electropi_api
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/electropi_pm
      JWT_SECRET: ${JWT_SECRET:-supersecretkey_change_in_prod}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    depends_on:
      - mongo

volumes:
  mongo_data:
